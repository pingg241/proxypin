name: iOS Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ios/**
      - lib/**
      - pubspec.yaml
      - pubspec.lock
      - .github/workflows/ios-build.yml
  pull_request:
    paths:
      - ios/**
      - lib/**
      - pubspec.yaml
      - pubspec.lock
      - .github/workflows/ios-build.yml

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build IPA (No Codesign)
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.7
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Install Dart/Flutter Dependencies
        run: flutter pub get

      - name: Install CocoaPods Dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Build IPA
        run: flutter build ipa --release --no-codesign

      - name: Locate IPA
        run: |
          IPA_PATH=$(find build/ios/ipa -maxdepth 1 -name "*.ipa" -print -quit)
          if [ -z "$IPA_PATH" ]; then
            echo "No .ipa found in build/ios/ipa"
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"
          ls -lah "$IPA_PATH"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-no-codesign
          path: ${{ env.IPA_PATH }}
          if-no-files-found: error
